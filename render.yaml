services:
  - type: web
    name: student-housing-rw-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: student-housing-rw-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: student-housing-rw
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: student-housing-rw-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: student-housing-rw-db
    plan: free
    region: oregon
